<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vivid Geisha</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", sans-serif;
      background: #080808;
      color: #fff;
    }
    .page {
      min-height: 100vh;
      padding: 28px 20px 100px;
      background:
        radial-gradient(circle at 80% 10%, rgba(255, 212, 92, .16), transparent 35%),
        radial-gradient(circle at 10% 80%, rgba(255, 88, 140, .14), transparent 38%),
        #080808;
    }
    .brand {
      font-size: 13px;
      color: #9c9c9c;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 64px;
    }
    .badge {
      display: inline-flex;
      padding: 8px 12px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 999px;
      font-size: 13px;
      color: #d8d8d8;
      background: rgba(255,255,255,.04);
      margin-bottom: 20px;
    }
    h1 {
      font-size: 48px;
      line-height: 1.02;
      letter-spacing: -0.06em;
      margin: 0;
    }
    .desc {
      margin-top: 18px;
      font-size: 17px;
      line-height: 1.6;
      color: #b8b8b8;
    }
    .hero-card {
      margin-top: 42px;
      padding: 22px;
      border-radius: 28px;
      background: linear-gradient(145deg, rgba(255,255,255,.12), rgba(255,255,255,.04));
      border: 1px solid rgba(255,255,255,.1);
      box-shadow: 0 30px 80px rgba(0,0,0,.45);
    }
    .coffee-name {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.04em;
    }
    .coffee-meta {
      margin-top: 8px;
      color: #aaa;
      font-size: 14px;
    }
    .note {
      margin-top: 28px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .chip {
      padding: 14px 10px;
      text-align: center;
      border-radius: 18px;
      background: rgba(255,255,255,.07);
      font-size: 13px;
    }
    .nav {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: 18px;
      height: 66px;
      border-radius: 24px;
      background: rgba(20,20,20,.86);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,.1);
      display: grid;
      grid-template-columns: repeat(4,1fr);
      z-index: 10;
    }
    .nav a {
      color: #777;
      text-decoration: none;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 4px;
    }
    .nav a.active { color: #fff; }
    .cta {
      display: block;
      margin-top: 28px;
      padding: 17px 20px;
      border-radius: 18px;
      background: #fff;
      color: #000;
      text-align: center;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="brand">QR Coffee Experience</div>

    <div class="badge">Limited Release</div>

    <h1>Vivid<br>Geisha</h1>

    <p class="desc">
      밝은 꽃향, 선명한 시트러스, 차처럼 깨끗한 여운을 가진 게이샤 커피입니다.
    </p>

    <section class="hero-card">
      <div class="coffee-name">Vivid Geisha</div>
      <div class="coffee-meta">Ethiopia · Geisha · Washed · Light Roast</div>

      <div class="note">
        <div class="chip">Floral</div>
        <div class="chip">Citrus</div>
        <div class="chip">Tea-like</div>
      </div>

      <a class="cta" href="info.html">원두 정보 보기</a>
    </section>
  </main>

  <nav class="nav">
    <a class="active" href="index.html">Home</a>
    <a href="info.html">Info</a>
    <a href="brew.html">Brew</a>
    <a href="buy.html">Buy</a>
  </nav>
</body>
</html>
