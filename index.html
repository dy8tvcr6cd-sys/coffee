<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Roastery QR Experience</title>

  <style>
    :root {
      --bg: #F7F3EA;
      --surface: #FFFFFF;
      --surface-soft: #FBF8F1;

      --text: #1F1C18;
      --muted: #756F66;
      --soft: #A49A8D;
      --line: rgba(31, 28, 24, 0.1);

      --accent: #D6A93A;
      --accent-soft: #FFF4CC;
      --brown: #3A2A1D;

      --citrus: #F28A2E;
      --honey: #D6A93A;
      --clean: #8FC7D9;
      --floral: #E9A7B5;
      --nutty: #8B5E3C;

      --radius-xl: 34px;
      --radius-lg: 26px;
      --radius-md: 18px;

      --shadow: 0 18px 50px rgba(58, 42, 29, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top right, rgba(214, 169, 58, 0.16), transparent 32%),
        linear-gradient(180deg, #FAF7EF 0%, var(--bg) 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Inter", "Segoe UI", sans-serif;
      letter-spacing: -0.03em;
    }

    button {
      font-family: inherit;
    }

    .app {
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 22px 18px 112px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 26px;
    }

    .brand {
      font-size: 13px;
      font-weight: 850;
      color: var(--brown);
      letter-spacing: -0.01em;
    }

    .pill {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.64);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      backdrop-filter: blur(12px);
    }

    .page {
      display: none;
      animation: fadeUp 0.24s ease both;
    }

    .page.active {
      display: block;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hero {
      padding: 22px 0 10px;
    }

    .eyebrow {
      color: var(--accent);
      font-size: 14px;
      font-weight: 850;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 48px;
      line-height: 0.98;
      font-weight: 900;
      color: var(--text);
    }

    .lead {
      margin: 18px 0 24px;
      font-size: 18px;
      line-height: 1.5;
      color: var(--muted);
    }

    .primary-btn {
      width: 100%;
      border: none;
      border-radius: 20px;
      padding: 18px 20px;
      background: var(--brown);
      color: #fff;
      font-size: 17px;
      font-weight: 850;
      cursor: pointer;
      box-shadow: 0 18px 40px rgba(58, 42, 29, 0.18);
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .primary-btn:active {
      transform: scale(0.98);
    }

    .secondary-btn {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 15px 16px;
      background: rgba(255,255,255,0.68);
      color: var(--text);
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    .card {
      background: rgba(255,255,255,0.78);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      padding: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 24px;
      font-weight: 900;
    }

    .section-copy {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }
