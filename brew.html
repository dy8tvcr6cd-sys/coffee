<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vivid Geisha Brew</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", sans-serif;
      background: #080808;
      color: #fff;
    }
    .page { padding: 28px 20px 100px; }
    .top { color: #8e8e8e; font-size: 13px; margin-bottom: 22px; }
    h1 {
      font-size: 36px;
      letter-spacing: -0.05em;
      margin: 0 0 24px;
    }
    .recipe-card {
      padding: 24px;
      border-radius: 30px;
      background:
        radial-gradient(circle at 80% 0%, rgba(255,209,92,.14), transparent 40%),
        #141414;
      border: 1px solid rgba(255,255,255,.09);
    }
    .timer {
      font-size: 58px;
      letter-spacing: -0.05em;
      text-align: center;
      margin: 28px 0;
      font-weight: 700;
    }
    .step {
      padding: 16px 0;
      border-bottom: 1px solid rgba(255,255,255,.08);
      display: flex;
      justify-content: space-between;
      color: #cfcfcf;
    }
    .step:last-child { border-bottom: none; }
    button {
      width: 100%;
      height: 58px;
      border: none;
      border-radius: 20px;
      background: #fff;
      color: #000;
      font-size: 16px;
      font-weight: 700;
      margin-top: 22px;
    }
    .subbtn {
      background: rgba(255,255,255,.09);
      color: #fff;
      margin-top: 10px;
    }
    .guide {
      margin-top: 30px;
      color: #b8b8b8;
      font-size: 15px;
      line-height: 1.7;
    }
    .nav {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: 18px;
      height: 66px;
      border-radius: 24px;
      background: rgba(20,20,20,.86);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,.1);
      display: grid;
      grid-template-columns: repeat(4,1fr);
    }
    .nav a {
      color: #777;
      text-decoration: none;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav a.active { color: #fff; }
  </style>
</head>
<body>
  <main class="page">
    <div class="top">Brew Guide</div>
    <h1>Vivid Geisha<br>Recipe</h1>

    <section class="recipe-card">
      <div class="step"><span>Dose</span><strong>20g</strong></div>
      <div class="step"><span>Water</span><strong>300g</strong></div>
      <div class="step"><span>Temperature</span><strong>92°C</strong></div>
      <div class="step"><span>Grind</span><strong>Medium</strong></div>

      <div class="timer" id="timer">00:00</div>

      <button onclick="startTimer()">Start Brew</button>
      <button class="subbtn" onclick="resetTimer()">Reset</button>
    </section>

    <p class="guide">
      0:00 Bloom 40g<br>
      0:40 Pour to 140g<br>
      1:20 Pour to 230g<br>
      2:00 Finish to 300g<br>
      2:40 - 3:00 추출 완료
    </p>
  </main>

  <nav class="nav">
    <a href="index.html">Home</a>
    <a href="info.html">Info</a>
    <a class="active" href="brew.html">Brew</a>
    <a href="buy.html">Buy</a>
  </nav>

  <script>
    let seconds = 0;
    let interval = null;

    function updateTimer() {
      const m = String(Math.floor(seconds / 60)).padStart(2, "0");
      const s = String(seconds % 60).padStart(2, "0");
      document.getElementById("timer").innerText = `${m}:${s}`;
    }

    function startTimer() {
      clearInterval(interval);
      interval = setInterval(() => {
        seconds++;
        updateTimer();
      }, 1000);
    }

    function resetTimer() {
      clearInterval(interval);
      seconds = 0;
      updateTimer();
    }
  </script>
</body>
</html>
