<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brew Recipe</title>
<style>
:root{--bg:#F6F1E8;--card:#FFFDFC;--text:#1F1A16;--muted:#746B61;--line:rgba(31,26,22,.1);--brown:#2D2118;--accent:#C99A2E;--citrus:#F28A2E;--honey:#D6A93A;--clean:#8FC7D9}
*{box-sizing:border-box}
body{margin:0;background:#F6F1E8;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Pretendard",sans-serif;letter-spacing:-.03em}
.wrap{max-width:520px;margin:0 auto;padding:22px 16px 96px}
h1{font-size:38px;margin:0 0 16px}
.card{background:rgba(255,255,255,.88);border:1px solid var(--line);border-radius:24px;padding:20px;margin-bottom:16px;box-shadow:0 16px 44px rgba(45,33,24,.08)}
.row{display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.muted{color:var(--muted)}
.timer{font-size:54px;text-align:center;color:var(--accent);font-weight:950;margin:20px 0;font-variant-numeric:tabular-nums}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button,.btn{border:none;border-radius:16px;padding:16px;background:var(--brown);color:white;font-weight:900;text-align:center;text-decoration:none;font-size:15px}
.ghost{background:white;color:var(--text);border:1px solid var(--line)}
.option{width:100%;margin-top:10px;background:white;color:var(--text);border:1px solid var(--line)}
.dot{width:14px;height:14px;border-radius:50%;display:inline-block;margin-right:8px}
.intensity{color:var(--accent);font-weight:900}
.nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:520px;background:rgba(255,255,255,.94);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);padding:10px 0 12px;backdrop-filter:blur(18px)}
.nav a{text-align:center;text-decoration:none;color:var(--muted);font-size:12px;font-weight:800}
.nav a.active{color:var(--brown)}
</style>
</head>
<body>
<div class="wrap">
  <h1>Brew Recipe</h1>

  <section class="card">
    <div class="row"><span class="muted">원두</span><strong>20g</strong></div>
    <div class="row"><span class="muted">물</span><strong>300g</strong></div>
    <div class="row"><span class="muted">물 온도</span><strong>92°C</strong></div>
    <div class="row"><span class="muted">분쇄도</span><strong>중간보다 살짝 굵게</strong></div>
    <div class="row"><span class="muted">총 추출 시간</span><strong>2:30</strong></div>
  </section>

  <section class="card">
    <h2>Extraction Timer</h2>
    <div class="timer" id="timer">02:30</div>
    <div class="grid">
      <button onclick="startTimer()">시작</button>
      <button class="ghost" onclick="resetTimer()">초기화</button>
    </div>
  </section>

  <section class="card">
    <h2>Flavor Detail</h2>
    <div class="row"><span><span class="dot" style="background:var(--citrus)"></span>Citrus</span><span class="intensity">●●●●○</span></div>
    <div class="row"><span><span class="dot" style="background:var(--honey)"></span>Honey</span><span class="intensity">●●●○○</span></div>
    <div class="row"><span><span class="dot" style="background:var(--clean)"></span>Clean</span><span class="intensity">●●●●○</span></div>
  </section>

  <section class="card">
    <h2>Sensory Form</h2>
    <p class="muted">마신 직후 가장 가까운 느낌을 선택하세요.</p>
    <button class="option">산미가 좋았어요</button>
    <button class="option">단맛이 좋았어요</button>
    <button class="option">깔끔한 여운이 좋았어요</button>
    <button class="option">더 진한 커피를 추천받고 싶어요</button>
  </section>

  <a href="buy.html" class="btn">마음에 들면 다시 구매하기</a>
</div>

<nav class="nav">
  <a href="index.html">Home</a>
  <a href="brew.html" class="active">Brew</a>
  <a href="info.html">Info</a>
  <a href="buy.html">Buy</a>
</nav>

<script>
let total=150,current=150,interval=null;
function update(){
  const m=String(Math.floor(current/60)).padStart(2,"0");
  const s=String(current%60).padStart(2,"0");
  document.getElementById("timer").textContent=`${m}:${s}`;
}
function startTimer(){
  if(interval) return;
  interval=setInterval(()=>{
    if(current<=0){clearInterval(interval);interval=null;return;}
    current--; update();
  },1000);
}
function resetTimer(){
  clearInterval(interval);interval=null;current=total;update();
}
</script>
</body>
</html>
