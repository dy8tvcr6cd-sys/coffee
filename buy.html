<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buy Vivid Geisha</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", sans-serif;
      background: #080808;
      color: #fff;
    }
    .page { padding: 28px 20px 100px; }
    .top { color: #8e8e8e; font-size: 13px; margin-bottom: 22px; }
    h1 {
      font-size: 36px;
      letter-spacing: -0.05em;
      margin: 0 0 16px;
    }
    .desc {
      color: #b8b8b8;
      line-height: 1.6;
      margin-bottom: 30px;
    }
    .product {
      padding: 24px;
      border-radius: 30px;
      background: linear-gradient(145deg, rgba(255,255,255,.1), rgba(255,255,255,.035));
      border: 1px solid rgba(255,255,255,.1);
      margin-bottom: 16px;
    }
    .product h2 {
      margin: 0;
      font-size: 22px;
      letter-spacing: -0.04em;
    }
    .meta {
      margin-top: 8px;
      color: #aaa;
      font-size: 14px;
    }
    .price {
      margin-top: 22px;
      font-size: 26px;
      font-weight: 800;
    }
    .btn {
      display: block;
      margin-top: 20px;
      padding: 17px 20px;
      border-radius: 18px;
      background: #fff;
      color: #000;
      text-align: center;
      text-decoration: none;
      font-weight: 800;
    }
    .secondary {
      background: rgba(255,255,255,.09);
      color: #fff;
    }
    .recommend-title {
      margin-top: 36px;
      margin-bottom: 14px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.04em;
    }
    .mini {
      padding: 18px;
      border-radius: 22px;
      background: #141414;
      border: 1px solid rgba(255,255,255,.08);
      margin-bottom: 12px;
    }
    .mini strong { display: block; margin-bottom: 6px; }
    .mini span { color: #aaa; font-size: 14px; }
    .nav {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: 18px;
      height: 66px;
      border-radius: 24px;
      background: rgba(20,20,20,.86);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,.1);
      display: grid;
      grid-template-columns: repeat(4,1fr);
    }
    .nav a {
      color: #777;
      text-decoration: none;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav a.active { color: #fff; }
  </style>
</head>
<body>
  <main class="page">
    <div class="top">Re-order</div>
    <h1>마음에 들었다면<br>다시 구매하세요</h1>

    <p class="desc">
      지금 마신 Vivid Geisha와 비슷한 향미의 원두도 함께 추천합니다.
    </p>

    <section class="product">
      <h2>Vivid Geisha</h2>
      <div class="meta">Ethiopia · Geisha · Washed · 100g</div>
      <div class="price">₩28,000</div>

      <a class="btn" href="#">같은 원두 다시 구매</a>
      <a class="btn secondary" href="#">로스터리 스토어 보기</a>
    </section>

    <div class="recommend-title">비슷한 원두 추천</div>

    <div class="mini">
      <strong>Floral Ethiopia</strong>
      <span>꽃향과 차 같은 여운이 좋은 라이트 로스트</span>
    </div>

    <div class="mini">
      <strong>Citrus Washed</strong>
      <span>밝은 산미와 깨끗한 후미 중심</span>
    </div>

    <div class="mini">
      <strong>Panama Geisha</strong>
      <span>더 섬세하고 고급스러운 게이샤 프로파일</span>
    </div>
  </main>

  <nav class="nav">
    <a href="index.html">Home</a>
    <a href="info.html">Info</a>
    <a href="brew.html">Brew</a>
    <a class="active" href="buy.html">Buy</a>
  </nav>
</body>
</html>
